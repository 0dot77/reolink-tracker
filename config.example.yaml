# Reolink -> YOLO 사람 트래커 -> OSC (공유 projection UV)
# 이 파일을 config.yaml로 복사한 뒤 실제 카메라 URL/비밀번호를 로컬에서 채우세요.
# <camera-ip>는 현장 네트워크에서 카메라가 받은 IP입니다.
# 라우터, Mac Internet Sharing 직결, 설치 장소가 바뀌면 다시 확인해서 갱신하세요.

model: yolo26s.pt
device: mps
imgsz: 1280
# YOLO raw threshold는 낮게 두고 detection_filter에서 actor 승격을 보수적으로 거른다.
conf: 0.16
tracker: botsort.yaml

processing:
  # 각 카메라 YOLO 처리를 별도 worker에서 돌려, 느린 카메라가 OSC heartbeat를 막지 않게 한다.
  parallel: true
  # 너무 오래된 RTSP frame은 늦은 좌표를 보내는 대신 버린다. 0이면 stale drop 비활성화.
  max_frame_age_s: 1.0
  # main loop가 소비하지 못한 worker 결과는 최신 결과만 남기고 교체한다.
  result_queue_size: 4

preprocessing:
  clahe:
    enabled: true
    clip_limit: 2.0
    tile_grid: [8, 8]
    # 현재는 저조도 중앙 보강용 cam2에만 적용해서 primary cam0/cam1 baseline을 유지한다.
    cameras: [cam2]

osc:
  host: 127.0.0.1
  port: 7000
  # td_minimal: TouchDesigner 런타임용 최소 스트림.
  #   /proj/<id>/active       [gid, ...]
  #   /proj/<id>/person_zones [gid, zone_code, gid, zone_code, ...]
  #   /proj/<id>/xy           [gid, x, y, gid, x, y, ...]
  #   /proj/<id>/uv           [gid, u, v, gid, u, v, ...]
  # x/y는 projection pixel_size가 있으면 픽셀 좌표, 없으면 0..1 UV입니다.
  # uv는 항상 0..1 정규화 좌표입니다.
  # person_zones의 zone_code는 0=floor, 1=body_catch, 2=stair_relaxed입니다.
  td_minimal: true
  # person_level: cross-camera fused debug stream. live TD에서는 td_minimal primary만으로 충분하면
  # false를 권장합니다. 필요할 때만 /proj/<id>/person/<gid> 상세 row를 추가 송신합니다.
  # packed /xy를 TD에서 전부 unpack하기 어려울 때 /proj/<id>/person/<gid>를 받을 수 있습니다.
  person_level: false
  # raw_per_cam: 카메라별 raw 트랙. td_minimal=true일 때는 자동으로 꺼집니다.
  raw_per_cam: false
  # zone_level: interaction_zones 상세 이벤트. td_minimal=true일 때는 자동으로 꺼집니다.
  zone_level: false
  # frame 입력이 잠깐 멈춰도 person/zone count heartbeat를 유지하는 주기.
  heartbeat_interval_s: 0.05
  legacy_image_space: false

fusion:
  # 같은 사람이 한 카메라 dispatch에서 다음 카메라 dispatch로 넘어갈 때 gid를 유지하는 시간 윈도우.
  # 길수록 occlusion이나 짧은 detection drop에 강하지만, 두 사람이 같은 자리를 빠르게 교차할
  # 때 ID가 섞일 가능성도 커짐. 기본 2.5 s는 BoT-SORT track_buffer + miss_buffer + 여유.
  hand_off_window_s: 2.5
  # hand-off 후보를 같은 위치로 인정할 UV 거리(0~1). 0.05는 40m 복도에서 약 2 m.
  match_uv_radius: 0.05
  # 속도 EMA 가중치. 1.0이면 매 프레임 즉시 반영, 0에 가까우면 매우 부드러움.
  velocity_alpha: 0.3
  # 위치 EMA 가중치. 낮을수록 actor 위치가 부드럽지만 실제 움직임보다 늦게 따라온다.
  # fast live 기본값 0.75는 약간의 jitter를 허용하고 OSC 반응을 더 빠르게 따라간다.
  position_alpha: 0.75
  # track이 끊겼을 때 held 상태를 유지할 projection edge margin.
  # 0.08이면 UV 가장자리 8% 안쪽에서만 held로 남고, 중앙 miss는 즉시 lost 처리한다.
  hold_boundary_margin_uv: 0.08
  # cam0 -> cam2 -> cam1 같은 내부 dispatch 경계에서 track이 끊기면 held로 붙잡지 않는다.
  # hand-off는 overlap fresh/projection-only observation으로 stitch하고, 사라진 중앙 actor는 바로 lost 처리한다.
  # 같은 사람을 cam0/cam2가 같은 프레임에 fresh dispatch로 동시에 잡으면,
  # 이 거리 안의 cross-camera duplicate는 새 gid를 만들지 않고 기존 gid로 흡수한다.
  # 너무 크게 잡으면 가까운 두 사람이 합쳐질 수 있으므로 0.03~0.05부터 시작한다.
  overlap_duplicate_radius_uv: 0.04
  # 같은 gid의 다음 관측점이 이 UV 거리보다 멀면 순간이동으로 보고 새 gid로 분리한다.
  # 바닥 인터랙션에서는 OSC actor가 프로젝션 면을 갑자기 가로지르는 것을 막는 안전장치다.
  # 0이면 비활성화. 0.08은 40m projection에서 약 3.2m 규모의 큰 점프를 차단한다.
  max_update_jump_uv: 0.08
  # 계단/착석자 relaxed actor는 detection이 잠깐 끊겨도 더 오래 held로 남긴다.
  # 움직임이 적은 좌석 presence 전용 완충값이며, 일반 보행자 hold에는 적용되지 않는다.
  relaxed_hold_s: 3.0
  # 사람이 완전히 lost된 뒤에는 가장 작은 빈 gid를 재사용한다.
  # TouchDesigner OSC 채널/테이블이 총 방문자 수만큼 계속 늘어나는 것을 막는다.
  reuse_lost_gids: true
  # auxiliary 카메라는 새 gid를 만들지 않고, primary gid가 중앙에서 lost 되려 할 때
  # 가까운 sighting으로 hand-off를 확인한다.
  aux_match_uv_radius: 0.08
  aux_match_time_window_s: 0.5
  # 0이면 auxiliary는 확인만 하고 위치를 움직이지 않는다. 0.25는 held 위치를 살짝만 따라가게 한다.
  aux_position_alpha: 0.25
  # CamWorker가 하나의 tid를 lost_source로 fusion에 알리기 전까지 견디는 연속 결손 프레임 수.
  # 짧은 YOLO/BoT-SORT detection drop이 매번 새 gid를 만들지 않도록 흡수한다.
  # 0이면 결손 즉시 lost (legacy). 기본 8은 ≈ 400 ms @ 20 fps.
  # 이 값은 사라짐/lost 반응만 바꾸며, 첫 등장 반응은 detection_filter confirm 값이 좌우한다.
  miss_buffer_frames: 8

detection_filter:
  # YOLO raw person box가 바로 인터랙션 actor가 되지 않도록 후처리한다.
  # 가방/그림자/경계부 1프레임 오검출을 줄이기 위한 현장 기본값.
  enabled: true
  min_confidence: 0.28
  min_bbox_height_px: 42
  min_bbox_area_px: 900
  min_aspect_h_over_w: 1.15
  max_aspect_h_over_w: 5.8
  max_width_over_height: 1.05
  projection_inner_margin_uv: 0.0
  # relaxed_* 값은 region.relaxed_presence_points/stair_catch_points 안에서만 적용된다.
  # 계단 착석자처럼 bbox가 가로로 넓거나 짧게 잡히는 경우를 살리기 위한 별도 기준이다.
  # region.relaxed_presence_enabled: false이면 저장된 계단 polygon은 보존하되 runtime에서 무시한다.
  relaxed_min_confidence: 0.12
  relaxed_min_bbox_height_px: 24
  relaxed_min_bbox_area_px: 500
  relaxed_min_aspect_h_over_w: 0.45
  relaxed_max_aspect_h_over_w: 6.5
  relaxed_max_width_over_height: 2.4
  # fast live 기본값: 2 hit / 0.35 s. 더 낮추면 첫 반응은 빨라지지만 오검출 승격이 늘 수 있다.
  confirm_hits: 2
  confirm_window_s: 0.35
  # auxiliary 카메라는 새 actor를 만들지 않으므로 sighting 확인을 더 빠르게 한다.
  auxiliary_confirm_hits: 1

projections:
  - id: corridor
    pixel_size: [9600, 1080]
    world_size_m: [40.0, 4.5]
    # Output Warp: cross-camera fusion 이후 OSC/zone 평가 직전에 적용되는 최종 projection 보정.
    # 순서: top-left, top-right, bottom-right, bottom-left. identity면 좌표를 바꾸지 않는다.
    output_warp_points: [[0.0, 0.0], [1.0, 0.0], [1.0, 1.0], [0.0, 1.0]]
    interaction_zones:
      - id: center
        uv_rect: [0.35, 0.15, 0.65, 0.85]
        release_after_s: 0.6

cameras:
  - name: cam0
    url: rtsp://admin:<urlencoded-password>@<camera-ip>:554/h264Preview_01_sub
    osc_prefix: /cam/0
    tracking_enabled: true
    regions: []

  # 정면 cam2는 중앙 hand-off 보강용 auxiliary confirmer로 둡니다.
  # role: auxiliary이면 YOLO 추론은 하지만 새 gid/raw per-cam actor를 만들지 않고,
  # cam0/cam1 primary actor가 중앙에서 끊기려 할 때 sighting으로만 기여합니다.
  # 예시 분담:
  #   cam0 dispatch_uv [0.00, 0.0, 0.50, 1.0]
  #   cam1 dispatch_uv [0.50, 0.0, 1.00, 1.0]
  # - name: cam2
  #   url: rtsp://admin:<urlencoded-password>@<center-camera-ip>:554/h264Preview_01_sub
  #   osc_prefix: /cam/2
  #   tracking_enabled: true
  #   role: auxiliary
  #   # primary의 top-level conf는 유지하되 cam2만 낮춰 저대비 옆모습 후보를 버리지 않는다.
  #   conf: 0.08
  #   # crop은 현장 테스트용 옵션입니다. 중앙 구간 miss의 1차 대응은 cam0/cam1 dispatch 재분담이며,
  #   # crop은 cam2 tracking을 다시 켜서 비교할 때만 사용합니다.
  #   body_catch_inference_crop:
  #     enabled: false
  #     margin_px: 96
  #   regions:
  #     - id: center_band
  #       projection_id: corridor
  #       # 도면 중앙 카메라는 중앙 hand-off/사각지대 보강용입니다.
  #       # 현장에서 앱 Calibration UI로 실제 바닥 4점을 다시 찍으세요.
  #       image_points: [[180, 120], [1040, 120], [1080, 560], [150, 560]]
  #       projection_uv: [0.32, 0.0, 0.68, 1.0]
  #       dispatch_uv: []
  #       body_catch_points: [[150, 85], [1080, 90], [1100, 260], [140, 250]]
  #       body_catch_margin_uv: 0.20
  #       body_catch_min_confidence: 0.08
  #       min_bbox_height_px: 24

  # - name: cam1
  #   url: rtsp://admin:<urlencoded-password>@<camera-ip>:554/h264Preview_01_sub
  #   osc_prefix: /cam/1
  #   tracking_enabled: true
  #   regions:
  #     - id: far_half
  #       projection_id: corridor
  #       # image pixel 4점은 projection-UV 순서로 입력합니다.
  #       # top-left -> top-right -> bottom-right -> bottom-left
  #       image_points: [[150, 140], [770, 130], [790, 470], [130, 460]]
  #       projection_uv: [0.45, 0.0, 1.0, 1.0]
  #       dispatch_uv: [0.60, 0.0, 1.0, 1.0]
  #       # 선택 사항: 사람 몸통/bbox가 이 polygon과 겹치면 foot point가
  #       # 바닥 region 경계 밖으로 살짝 빠져도 projection rect로 clamp하여 살린다.
  #       # OSC 위치 계산은 여전히 image_points homography를 사용하고,
  #       # bbox 크기/비율 필터와 confirm window는 그대로 적용된다.
  #       body_catch_points: [[130, 90], [820, 90], [820, 210], [130, 210]]
  #       body_catch_margin_uv: 0.35
  #       body_catch_min_confidence: 0.12
  #       # 계단/착석자 전용 완화 polygon. viewer에서는 s 키로 기존 floor region 위에
  #       # 따로 그릴 수 있다.
  #       relaxed_presence_enabled: true
  #       relaxed_presence_points: [[150, 120], [780, 120], [760, 260], [160, 260]]
  #       # 선택 사항: relaxed_presence_points 4점을 계단 전용 projection UV rect로
  #       # 다시 투영한다. 좌우 카메라의 사다리꼴 오차가 보이면 이 rect를 조정한다.
  #       relaxed_presence_uv: [0.45, 0.15, 1.0, 0.35]
  #       relaxed_presence_margin_uv: 0.10
  #       relaxed_presence_min_confidence: 0.12
  #       # 선택 사항: 계단/착석자 actor는 warp 결과 v 대신 이 projection v를 사용한다.
  #       relaxed_presence_v: 0.35
  #       # 같은 의미의 호환 alias: stair_catch_points
  #       min_bbox_height_px: 24
