name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide release bump
        id: release
        run: python .github/scripts/auto_release.py

      - name: Create GitHub release
        if: steps.release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          NOTES_PATH: ${{ steps.release.outputs.notes_path }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file "$NOTES_PATH"

      - name: Summary
        run: |
          if [ "${{ steps.release.outputs.should_release }}" = "true" ]; then
            echo "Created ${{ steps.release.outputs.tag }} (${{ steps.release.outputs.bump }})"
          else
            echo "No release needed"
          fi
